<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tarozu — весы и печать этикеток</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Segoe UI", Arial, sans-serif; background: #10151c; color: #e8edf2;
         display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; }
  h1 { font-size: 20px; font-weight: 600; color: #8fa3b8; margin-bottom: 12px; }
  .panel { background: #1a2230; border-radius: 14px; padding: 18px 22px; width: 100%;
           max-width: 760px; margin-bottom: 14px; }
  #weight { font-size: 14vw; max-font-size: 120px; line-height: 1.05; font-weight: 700;
            text-align: center; font-variant-numeric: tabular-nums; }
  @media (min-width: 900px) { #weight { font-size: 120px; } }
  #weight.stable { color: #5ad87a; }
  #weight.moving { color: #f0c33c; }
  #weight.offline { color: #e25555; font-size: 36px; }
  .sub { text-align: center; color: #8fa3b8; font-size: 15px; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
  label { display: block; font-size: 13px; color: #8fa3b8; margin-bottom: 4px; }
  select, input { width: 100%; padding: 10px; font-size: 17px; border-radius: 8px;
                  border: 1px solid #2c3a4f; background: #0f1622; color: #e8edf2; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px 16px; margin-top: 12px; }
  #printBtn { width: 100%; margin-top: 16px; padding: 18px; font-size: 24px; font-weight: 700;
              border: none; border-radius: 10px; background: #2f7df6; color: #fff; cursor: pointer; }
  #printBtn:active { transform: scale(.99); }
  #printBtn:disabled { background: #3a4a60; cursor: wait; }
  #status { margin-top: 10px; text-align: center; min-height: 22px; font-size: 15px; }
  #status.ok { color: #5ad87a; } #status.err { color: #e25555; }
  .netline { display: flex; justify-content: space-around; margin-top: 8px; font-size: 18px; color: #b9c6d4; }
  #previewWrap { text-align: center; }
  #preview { max-width: 100%; background: #fff; border-radius: 6px; min-height: 60px; }
  details summary { cursor: pointer; color: #8fa3b8; }
  .topbar { width: 100%; max-width: 760px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 12px; }
  .topbar h1 { margin: 0; }
  #settingsBtn { background: #243246; color: #b9c6d4; border: 1px solid #2c3a4f;
                 border-radius: 8px; padding: 8px 14px; font-size: 15px; cursor: pointer; }
  #settings h2 { font-size: 16px; color: #8fa3b8; margin: 14px 0 8px; }
  #settings h2:first-child { margin-top: 0; }
  table.prod { width: 100%; border-collapse: collapse; }
  table.prod th { font-size: 12px; color: #8fa3b8; text-align: left; padding: 2px 4px; }
  table.prod td { padding: 2px 4px; }
  table.prod input { padding: 6px; font-size: 15px; }
  .delBtn { background: #3a2430; color: #e25555; border: none; border-radius: 6px;
            padding: 6px 10px; cursor: pointer; font-size: 15px; }
  .btnRow { display: flex; gap: 10px; margin-top: 14px; }
  .btnRow button { flex: 1; padding: 12px; font-size: 17px; font-weight: 600;
                   border: none; border-radius: 8px; cursor: pointer; }
  #saveBtn { background: #2f8f4e; color: #fff; }
  #addProdBtn { background: #243246; color: #b9c6d4; }
  #setupStatus { margin-top: 8px; text-align: center; min-height: 20px; font-size: 14px; }
  #setupStatus.ok { color: #5ad87a; } #setupStatus.err { color: #e25555; }
</style>
</head>
<body>
<div class="topbar">
  <h1>TAROZU — весовой терминал</h1>
  <button id="settingsBtn">⚙ Настройки</button>
</div>

<div class="panel" id="settings" style="display:none">
  <h2>Весы</h2>
  <div class="row3">
    <div><label>Протокол</label>
      <select id="cfgProto">
        <option value="auto">auto — определить самому</option>
        <option value="cas">CAS</option>
        <option value="generic">generic — любой поток</option>
        <option value="demo">demo — без весов</option>
      </select></div>
    <div><label>COM-порт</label><select id="cfgPort"></select></div>
    <div><label>Скорость (бод)</label>
      <select id="cfgBaud">
        <option>1200</option><option>2400</option><option>4800</option>
        <option selected>9600</option><option>19200</option><option>38400</option>
        <option>57600</option><option>115200</option>
      </select></div>
  </div>
  <h2>Принтер</h2>
  <div class="row3">
    <div><label>Принтер</label><select id="cfgPrinter"></select></div>
    <div><label>Режим печати</label>
      <select id="cfgMode">
        <option value="escpos">ESC/POS (чековый / встроенный в POS)</option>
        <option value="tspl">TSPL (Xprinter и кит. принтеры)</option>
        <option value="zpl">ZPL (Zebra)</option>
        <option value="windows">Драйвер Windows</option>
        <option value="file">В файл (отладка)</option>
      </select></div>
    <div><label>Этикетка, мм (Ш×В)</label>
      <div style="display:flex;gap:6px">
        <input id="cfgLw" type="number" min="20" max="120" value="58">
        <input id="cfgLh" type="number" min="20" max="120" value="40">
      </div></div>
  </div>
  <div class="row3">
    <div><label>Подключение принтера</label><select id="cfgPPort"></select></div>
    <div><label>Скорость порта принтера</label>
      <select id="cfgPBaud">
        <option>9600</option><option>19200</option><option>38400</option>
        <option>57600</option><option>115200</option>
      </select></div>
    <div><label>Копий этикетки</label>
      <input id="cfgCopies" type="number" min="1" max="10" value="1"></div>
  </div>
  <div class="row3">
    <div><label>Поворот печати</label>
      <select id="cfgRotate">
        <option value="0">без поворота</option>
        <option value="90">90°</option>
        <option value="180">180°</option>
        <option value="270">270°</option>
      </select></div>
    <div><label>Сдвиг вправо, мм (− влево)</label>
      <input id="cfgOffX" type="number" step="0.5" value="0"></div>
    <div><label>Сдвиг вниз, мм (− вверх)</label>
      <input id="cfgOffY" type="number" step="0.5" value="0"></div>
  </div>
  <div class="row3">
    <div><label>Масштаб шрифта, %</label>
      <input id="cfgFScale" type="number" min="30" max="300" step="5" value="100"></div>
    <div><label>Пауза между печатями, с</label>
      <input id="cfgPause" type="number" min="0" max="10" step="0.5" value="0.5"></div>
    <div><label>Плотность печати 0–15 (TSPL)</label>
      <input id="cfgDensity" type="number" min="0" max="15" step="1" value="8"></div>
  </div>
  <h2>Производитель (печатается на этикетке)</h2>
  <div class="grid">
    <div><label>Название</label><input id="cfgCName"></div>
    <div><label>Адрес</label><input id="cfgCAddr"></div>
    <div><label>ИНН</label><input id="cfgCInn"></div>
    <div><label>Телефон</label><input id="cfgCPhone"></div>
  </div>
  <h2>Товары</h2>
  <table class="prod">
    <thead><tr><th style="width:60px">PLU</th><th>Название</th>
      <th style="width:90px">Срок, дн</th><th style="width:90px">Тара, г</th><th></th></tr></thead>
    <tbody id="prodRows"></tbody>
  </table>
  <div class="btnRow">
    <button id="addProdBtn">+ Добавить товар</button>
    <button id="testBtn" style="background:#243246;color:#b9c6d4">🖨 Тест печати</button>
    <button id="saveBtn">💾 Сохранить настройки</button>
  </div>
  <div class="btnRow">
    <button id="statusBtn" style="background:#243246;color:#b9c6d4">ℹ Статус принтера</button>
    <button id="clearqBtn" style="background:#3a2430;color:#e08585">🧹 Очистить очередь печати</button>
  </div>
  <div id="setupStatus"></div>
</div>

<div class="panel">
  <div id="weight" class="offline">нет связи с весами…</div>
  <div class="sub" id="scaleInfo"></div>
  <div class="netline">
    <span>Брутто: <b id="grossTxt">—</b></span>
    <span>Тара: <b id="tareTxt">—</b></span>
    <span>Нетто: <b id="netTxt">—</b></span>
  </div>
</div>

<div class="panel">
  <div class="grid">
    <div>
      <label>Продукт</label>
      <select id="product"></select>
    </div>
    <div>
      <label>Тара упаковки, г</label>
      <input id="tare" type="number" min="0" step="1" value="0">
    </div>
  </div>
  <div class="row3">
    <div>
      <label>Дата производства</label>
      <input id="prodDate" type="date">
    </div>
    <div>
      <label>Годен до</label>
      <input id="expDate" type="date">
    </div>
    <div>
      <label>Копий</label>
      <input id="copies" type="number" min="1" max="10" value="1">
    </div>
  </div>
  <button id="printBtn">🖨 ПЕЧАТЬ ЭТИКЕТКИ</button>
  <div id="status"></div>
</div>

<div class="panel" id="previewWrap">
  <details open>
    <summary>Предпросмотр этикетки</summary>
    <img id="preview" alt="предпросмотр появится при наличии веса" style="margin-top:10px">
  </details>
</div>

<script>
let products = [], state = {connected:false, weight_g:0, stable:false};

const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);

function currentProduct() {
  return products.find(p => p.plu == $('product').value);
}

function recalcExp() {
  const p = currentProduct(); if (!p) return;
  const d = new Date($('prodDate').value || today());
  d.setDate(d.getDate() + (p.shelf_days || 5));
  $('expDate').value = d.toISOString().slice(0,10);
}

async function loadProducts() {
  products = await (await fetch('/api/products')).json();
  $('product').innerHTML = products.map(p =>
    `<option value="${p.plu}">${p.plu}. ${p.name}</option>`).join('');
  $('product').onchange = () => { $('tare').value = currentProduct()?.tare_g ?? 0; recalcExp(); schedulePreview(); };
  $('tare').value = products[0]?.tare_g ?? 0;
  $('prodDate').value = today();
  recalcExp();
}

async function poll() {
  try {
    state = await (await fetch('/api/state')).json();
    const w = $('weight');
    if (!state.connected) {
      w.className = 'offline';
      w.textContent = 'нет связи с весами…';
      $('scaleInfo').textContent = state.error || '';
    } else {
      w.className = state.stable ? 'stable' : 'moving';
      w.textContent = state.weight_kg + ' кг';
      $('scaleInfo').textContent = (state.port ? 'порт ' + state.port + ' · ' : '') +
                                   (state.stable ? 'вес стабилен' : 'взвешивание…');
    }
    const tare = +$('tare').value || 0;
    $('grossTxt').textContent = (state.weight_g/1000).toFixed(3) + ' кг';
    $('tareTxt').textContent  = tare + ' г';
    $('netTxt').textContent   = (Math.max(0, state.weight_g - tare)/1000).toFixed(3) + ' кг';
  } catch (e) { $('weight').className = 'offline'; $('weight').textContent = 'сервер недоступен'; }
}

let prevTimer = null, lastPrevKey = '';
function schedulePreview() { clearTimeout(prevTimer); prevTimer = setTimeout(updatePreview, 400); }
function updatePreview() {
  if (!state.connected || state.weight_g <= 0) return;
  const q = new URLSearchParams({
    plu: $('product').value, tare_g: $('tare').value || 0,
    gross_g: state.weight_g,
    prod_date: $('prodDate').value, exp_date: $('expDate').value,
  });
  const key = q.toString();
  if (key === lastPrevKey) return;
  lastPrevKey = key;
  $('preview').src = '/api/preview?' + key;
}

$('printBtn').onclick = async () => {
  const btn = $('printBtn'), st = $('status');
  btn.disabled = true; st.className = ''; st.textContent = 'печать…';
  try {
    const copies = Math.max(1, +$('copies').value || 1);
    let res;
    for (let i = 0; i < copies; i++) {
      res = await (await fetch('/api/print', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          plu: +$('product').value, tare_g: +$('tare').value || 0,
          prod_date: $('prodDate').value, exp_date: $('expDate').value,
        })})).json();
      if (!res.ok) throw new Error(res.error);
    }
    st.className = 'ok';
    st.textContent = `✓ ${res.message} · нетто ${(res.label.net_g/1000).toFixed(3)} кг · ШК ${res.label.barcode_value}`;
  } catch (e) { st.className = 'err'; st.textContent = '✗ ' + e.message; }
  btn.disabled = false;
};

$('prodDate').onchange = () => { recalcExp(); schedulePreview(); };
$('expDate').onchange = $('tare').oninput = schedulePreview;

// ----- настройки -----
let cfg = null;

function prodRow(p = {}) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="number" min="1" class="pPlu" value="${p.plu ?? ''}"></td>
    <td><input class="pName" value="${(p.name ?? '').replace(/"/g,'&quot;')}"></td>
    <td><input type="number" min="1" class="pShelf" value="${p.shelf_days ?? 5}"></td>
    <td><input type="number" min="0" class="pTare" value="${p.tare_g ?? 0}"></td>
    <td><button class="delBtn" title="удалить">✕</button></td>`;
  tr.querySelector('.delBtn').onclick = () => tr.remove();
  return tr;
}

async function openSettings() {
  const setup = await (await fetch('/api/setup')).json();
  cfg = setup.config;
  const sc = cfg.scale, pr = cfg.printer, co = cfg.company;
  $('cfgProto').value = sc.protocol;
  $('cfgBaud').value = sc.baudrate;
  $('cfgPort').innerHTML = '<option value="auto">auto — найти автоматически</option>' +
    setup.ports.map(p => `<option value="${p.port}">${p.port} — ${p.desc}</option>`).join('');
  $('cfgPort').value = setup.ports.some(p => p.port === sc.port) ? sc.port : 'auto';
  $('cfgPrinter').innerHTML = '<option value="">(принтер по умолчанию)</option>' +
    setup.printers.map(n => `<option value="${n}">${n}</option>`).join('');
  $('cfgPrinter').value = setup.printers.includes(pr.name) ? pr.name : '';
  $('cfgMode').value = pr.mode;
  $('cfgPPort').innerHTML = '<option value="">через драйвер Windows</option>' +
    setup.ports.map(p => `<option value="${p.port}">напрямую: ${p.port} — ${p.desc}</option>`).join('');
  $('cfgPPort').value = setup.ports.some(p => p.port === pr.port) ? pr.port : '';
  $('cfgPBaud').value = pr.baudrate || 9600;
  $('cfgCopies').value = pr.copies || 1;
  $('cfgRotate').value = String(pr.rotate || 0);
  $('cfgOffX').value = pr.offset_x_mm || 0;
  $('cfgOffY').value = pr.offset_y_mm || 0;
  $('cfgFScale').value = pr.font_scale || 100;
  $('cfgPause').value = pr.pause_after_print_s ?? 0.5;
  $('cfgDensity').value = pr.density ?? 8;
  $('cfgLw').value = pr.label_width_mm; $('cfgLh').value = pr.label_height_mm;
  $('cfgCName').value = co.name; $('cfgCAddr').value = co.address;
  $('cfgCInn').value = co.inn; $('cfgCPhone').value = co.phone;
  const tb = $('prodRows'); tb.innerHTML = '';
  products.forEach(p => tb.appendChild(prodRow(p)));
  $('settings').style.display = '';
}

$('settingsBtn').onclick = () => {
  if ($('settings').style.display === 'none') openSettings();
  else $('settings').style.display = 'none';
};

$('addProdBtn').onclick = () => $('prodRows').appendChild(prodRow({plu: '', shelf_days: 5, tare_g: 10}));

$('testBtn').onclick = async () => {
  const st = $('setupStatus'); st.className = ''; st.textContent = 'печать теста…';
  try {
    const r = await (await fetch('/api/testprint', {method: 'POST'})).json();
    if (!r.ok) throw new Error(r.error);
    st.className = 'ok'; st.textContent = '✓ ' + r.message + ' — рамка должна совпасть с краями этикетки';
  } catch (e) { st.className = 'err'; st.textContent = '✗ ' + e.message; }
};

$('statusBtn').onclick = async () => {
  const st = $('setupStatus'); st.className = ''; st.textContent = 'опрос принтера…';
  try {
    const r = await (await fetch('/api/printerstatus')).json();
    if (!r.ok) throw new Error(r.error);
    let t = `«${r.printer}»: ${r.status.join(', ')}`;
    t += r.jobs.length
      ? ' | очередь: ' + r.jobs.map(j => `№${j.id} — ${j.status.join(', ')}`).join('; ')
      : ' | очередь пуста';
    st.className = 'ok'; st.textContent = t;
  } catch (e) { st.className = 'err'; st.textContent = '✗ ' + e.message; }
};

$('clearqBtn').onclick = async () => {
  const st = $('setupStatus'); st.className = ''; st.textContent = 'очистка очереди…';
  try {
    const r = await (await fetch('/api/clearqueue', {method: 'POST'})).json();
    if (!r.ok) throw new Error(r.error);
    st.className = 'ok'; st.textContent = '✓ ' + r.message;
  } catch (e) { st.className = 'err'; st.textContent = '✗ ' + e.message; }
};

$('saveBtn').onclick = async () => {
  const st = $('setupStatus'); st.className = ''; st.textContent = 'сохранение…';
  try {
    cfg.scale.protocol = $('cfgProto').value;
    cfg.scale.port = $('cfgPort').value;
    cfg.scale.baudrate = +$('cfgBaud').value;
    cfg.printer.name = $('cfgPrinter').value;
    cfg.printer.mode = $('cfgMode').value;
    cfg.printer.port = $('cfgPPort').value;
    cfg.printer.baudrate = +$('cfgPBaud').value || 9600;
    cfg.printer.copies = Math.max(1, +$('cfgCopies').value || 1);
    cfg.printer.rotate = +$('cfgRotate').value || 0;
    cfg.printer.offset_x_mm = +$('cfgOffX').value || 0;
    cfg.printer.offset_y_mm = +$('cfgOffY').value || 0;
    cfg.printer.font_scale = Math.min(300, Math.max(30, +$('cfgFScale').value || 100));
    cfg.printer.pause_after_print_s = Math.min(10, Math.max(0, +$('cfgPause').value || 0));
    cfg.printer.density = Math.min(15, Math.max(0, +$('cfgDensity').value ?? 8));
    cfg.printer.label_width_mm = +$('cfgLw').value || 58;
    cfg.printer.label_height_mm = +$('cfgLh').value || 40;
    cfg.company = { name: $('cfgCName').value, address: $('cfgCAddr').value,
                    inn: $('cfgCInn').value, phone: $('cfgCPhone').value };
    const prods = [...$('prodRows').children].map(tr => ({
      plu: +tr.querySelector('.pPlu').value || 0,
      name: tr.querySelector('.pName').value.trim(),
      shelf_days: +tr.querySelector('.pShelf').value || 5,
      tare_g: +tr.querySelector('.pTare').value || 0,
    })).filter(p => p.name);
    if (!prods.length) throw new Error('добавьте хотя бы один товар');
    let r = await (await fetch('/api/config', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(cfg)})).json();
    if (!r.ok) throw new Error(r.error);
    r = await (await fetch('/api/products', {method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(prods)})).json();
    if (!r.ok) throw new Error(r.error);
    await loadProducts();
    lastPrevKey = ''; schedulePreview();
    st.className = 'ok'; st.textContent = '✓ Сохранено и применено';
  } catch (e) { st.className = 'err'; st.textContent = '✗ ' + e.message; }
};

loadProducts().then(() => { poll(); setInterval(poll, 300); setInterval(schedulePreview, 1500); });
</script>
</body>
</html>
